<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gurbani Captioning</title>
  <style>
    /* Stub page Tauri shows for ~1-2s while the Rust shell waits for the
       sidecar to print BANI_READY port=<n>, then navigates the WebView to
       http://127.0.0.1:<n>/mic/. Kept minimal because anything fancier
       just delays first paint. The dot animation is pure CSS so we don't
       need to ship any JS at all. */
    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%;
      background: #0a0a0a; color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .splash { text-align: center; }
    .title { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 12px; }
    .sub   { font-size: 14px; color: #999; margin-bottom: 32px; }
    .dots span {
      display: inline-block; width: 8px; height: 8px; margin: 0 4px;
      background: #888; border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%           { transform: scale(1.0); opacity: 1.0; }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="title">Loading…</div>
    <div class="sub">starting engine</div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
</body>
</html>
